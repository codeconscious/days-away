name:                days-away
version:             0.1.0.0
github:              "githubuser/days-away"
license:             BSD-3-Clause
author:              "CodeConscio.us"
maintainer:          "hello@codeconscio.us"
copyright:           "2026 CodeConscio.us"

extra-source-files:
- README.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/days-away#readme>

dependencies:
- base >= 4.7 && < 5

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  dependencies:
  - text
  - mtl
  - time
  - filepath
  exposed-modules:
    - Lib
    - Types
    - Validation

executables:
  days-away-exe:
    main:                Main.hs
    source-dirs:         app
    default-extensions:
      - ScopedTypeVariables
      - TypeApplications
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wno-unused-top-binds
    dependencies:
    - days-away
    - text
    - mtl
    - time
    - filepath

tests:
  days-away-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    build-tools:
      - hspec-discover
    dependencies:
    - days-away
    - hspec
    - hspec-discover:hspec-discover
    - text
    - time
